---
- name: Déploiement Projet Applicatif
  hosts: app_servers
  become: true
  vars:
    project_dir: "/home/ubuntu/app"

  tasks:
    - name: Installation de Docker et dépendances
      apt:
        update_cache: yes
        name:
          - docker.io
          - docker-compose-v2
          - python3-docker
        state: present

    - name: Ajout de l'utilisateur au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Configuration de Docker pour autoriser le registre privé
      copy:
        content: |
          {
            "insecure-registries": ["{{ lookup('env', 'REGISTRY_URL') }}"]
          }
        dest: /etc/docker/daemon.json
      notify: Restart Docker

    # Force le restart de Docker immédiatement si la config a changé
    - name: Flush handlers
      meta: flush_handlers

    - name: Création du dossier du projet
      file:
        path: "{{ project_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu

    - name: Copie du fichier d'environnement
      copy:
        content: |
          MYSQL_ROOT_PASSWORD={{ lookup('env', 'MYSQL_ROOT_PASSWORD') }}
          REGISTRY_URL={{ lookup('env', 'REGISTRY_URL') }}
        dest: "{{ project_dir }}/.env"

    - name: Copie du docker-compose.yml
      copy:
        src: docker-compose.yml
        dest: "{{ project_dir }}/docker-compose.yml"

    - name: Authentification au registre privé
      docker_login:
        registry_url: "https://{{ lookup('env', 'REGISTRY_URL') }}"
        username: "{{ lookup('env', 'REGISTRY_USER') }}"
        password: "{{ lookup('env', 'REGISTRY_PASS') }}"

    - name: Pull des images
      command: docker compose pull
      args:
        chdir: "{{ project_dir }}"
      environment:
        REGISTRY_URL: "{{ lookup('env', 'REGISTRY_URL') }}"
        MYSQL_ROOT_PASSWORD: "{{ lookup('env', 'MYSQL_ROOT_PASSWORD') }}"

    - name: Démarrage de la stack applicative
      command: docker compose up -d
      args:
        chdir: "{{ project_dir }}"
      environment:
        REGISTRY_URL: "{{ lookup('env', 'REGISTRY_URL') }}"
        MYSQL_ROOT_PASSWORD: "{{ lookup('env', 'MYSQL_ROOT_PASSWORD') }}"

  handlers:
    - name: Restart Docker
      service:
        name: docker
        state: restarted
