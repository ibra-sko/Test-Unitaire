version: '3.1'

services:

  api:
    image: ${REGISTRY_URL}/api_server:latest
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/users')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  db:
    image: ${REGISTRY_URL}/migration_mysql:latest
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy

  react:
    image: ${REGISTRY_URL}/react:latest
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_SERVER_PORT=8000
    depends_on:
      api:
        condition: service_healthy
    command: npm start
    restart: always
